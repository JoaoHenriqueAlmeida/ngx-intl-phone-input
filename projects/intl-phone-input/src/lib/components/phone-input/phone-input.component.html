<ipi-country-selector
  [selectedCountry]="selectedCountry"
  [locale]="locale"
  (countryChange)="onCountrySelected($event)" />

<input
  #phoneInput
  class="ipi-phone-input"
  type="tel"
  inputmode="numeric"
  [placeholder]="placeholder"
  [disabled]="isDisabled"
  [formControl]="inputCtrl"
  [imask]="maskOptions"
  [unmask]="true"
  (focus)="onFocus()"
  (blur)="onBlur()" />
