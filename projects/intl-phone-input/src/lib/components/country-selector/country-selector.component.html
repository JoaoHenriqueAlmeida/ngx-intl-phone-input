<button
  #trigger
  type="button"
  class="ipi-country-trigger"
  role="combobox"
  [attr.aria-expanded]="isOpen"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-activedescendant]="
    isOpen ? (keyManager?.activeItem?.id ?? null) : null
  "
  (click)="openDropdown()"
  (keydown)="onTriggerKeydown($event)"
>
  <img
    class="ipi-flag"
    [src]="selectedCountry.flag"
    [alt]="selectedCountry.name"
    width="20"
    height="15"
  />
  <span class="ipi-dial-code">+{{ selectedCountry.dialCode }}</span>
</button>

<ng-template #dropdownTpl>
  <div class="ipi-dropdown-panel" (keydown)="onDropdownKeydown($event)">
    <input
      class="ipi-search-input"
      type="text"
      [formControl]="searchCtrl"
      autocomplete="off"
      placeholder="Search countries…"
    />
    <ul class="ipi-country-list" role="listbox">
      @for (country of filteredCountries; track country.iso) {
        <li
          ipiCountryOption
          [country]="country"
          [isSelected]="country.iso === selectedCountry.iso"
          class="ipi-country-option"
          [class.ipi-country-option--selected]="
            country.iso === selectedCountry.iso
          "
          (click)="selectCountry(country)"
        >
          <img
            class="ipi-country-option__flag"
            [src]="country.flag"
            [alt]="country.name"
          />
          <span class="ipi-country-option__name">{{ country.name }}</span>
          <span class="ipi-country-option__dial-code"
            >+{{ country.dialCode }}</span
          >
        </li>
      }
    </ul>
  </div>
</ng-template>
